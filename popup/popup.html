<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页中外互译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" stroke="currentColor" fill="currentColor">
        <path d="m575.73-226.04-37.924 100.231q-3.23 8-10.173 12.865-6.942 4.866-15.749 4.866-14.385 0-22.5-11.846t-2.846-25.73l155.154-400.731q3.346-8.115 10.5-12.884t15.577-4.769h21.499q8.423 0 15.576 4.923 7.154 4.922 10.693 13.038l154.961 400.23q5.769 13.769-2.692 25.769-8.461 12-22.845 12-9.116 0-16.154-4.866-7.038-4.865-10.384-13.48l-37.731-99.616H575.73ZM359.307-417.193 179.846-237.962q-7.808 8.192-18.961 8.499-11.154.308-19.961-8.499-8.5-8.5-8.5-19.615 0-11.115 8.5-19.807l179.154-179.847q-35.923-36.731-68.077-86.115-32.154-49.385-49.885-95.539h60.383q15.5 34.692 41.923 73.924 26.424 39.231 54.885 68.808 45.847-46.039 82.232-104.732 36.385-58.692 53.385-115.077H103.847q-11.653 0-19.864-8.211-8.212-8.211-8.212-19.865 0-11.461 8.212-19.672 8.21-8.212 19.864-8.212h228.269v-36.73q0-11.461 8.115-19.673 8.115-8.211 19.769-8.211 11.654 0 19.865 8.211 8.211 8.212 8.211 19.673v36.73h228.269q11.461 0 19.673 8.212 8.211 8.211 8.211 19.672 0 11.654-8.211 19.865-8.212 8.211-19.673 8.211h-63.076q-20.77 69.5-61.577 138.558-40.808 69.057-92.962 121.096l92.538 94.924-21.384 57.575-110.577-113.384Zm235.153 140h167.309l-83.655-220.962-83.654 220.962Z"/>
      </svg>
      <h1>网页中外互译</h1>
    </div>

    <div class="actions">
      <button id="translateToZh" class="btn btn-primary">转中文</button>
      <button id="translateToEn" class="btn btn-primary">转外文</button>
    </div>

    <div class="actions">
      <button id="restoreBtn" class="btn btn-secondary">还原页面</button>
    </div>

    <div class="toggles">
      <label class="toggle-row">
        <span>双语显示</span>
        <input type="checkbox" id="toggleDoubleShow">
      </label>
      <label class="toggle-row">
        <span>译文高亮</span>
        <input type="checkbox" id="toggleHighlight">
      </label>
      <label class="toggle-row">
        <span>自动翻译</span>
        <input type="checkbox" id="toggleAutoTranslate">
      </label>
      <label class="toggle-row">
        <span>选词翻译</span>
        <input type="checkbox" id="toggleSelectMode">
      </label>
    </div>

    <div class="engine-section">
      <div class="engine-label">当前引擎: <span id="currentEngineName">微软</span></div>
      <select id="engineSelect" class="engine-select">
        <option value="0">微软 (推荐)</option>
        <option value="1">谷歌 (推荐)</option>
        <option value="2">腾讯交互 (推荐)</option>
        <option value="3">有道手机 (推荐)</option>
        <option value="4">百度 (需key)</option>
        <option value="5">有道 (需key)</option>
        <option value="6">讯飞 (需key)</option>
        <option value="7">搜狗</option>
        <option value="8">词霸</option>
        <option value="9">沪江小D</option>
        <option value="10">彩云</option>
        <option value="11">Alibaba</option>
        <option value="12">Papago</option>
        <option value="13">百度手机</option>
        <option value="14">worldlinGO</option>
        <option value="15">DeepL (限制)</option>
        <option value="16">易翻通</option>
        <option value="17">Yandex</option>
        <option value="18">福昕</option>
        <option value="19">CNKI</option>
        <option value="20">金山快译</option>
      </select>
    </div>

    <div class="footer">
      <span id="versionText"></span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
